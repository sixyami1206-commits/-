<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Eats 風 - Delivery App 🍔</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Uber+Move+Text,Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --uber-black: #000000;
            --uber-green: #06C167;
            --uber-green-hover: #04A254;
            --uber-gray-bg: #F6F6F6;
            --uber-gray-text: #5E5E5E;
            --uber-card-bg: #FFFFFF;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
        }

        body {
            background-color: var(--uber-card-bg);
            color: var(--uber-black);
            padding-top: 130px;
            padding-bottom: 60px;
        }

        /* --- 固定ヘッダー --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 1000;
            border-bottom: 1px solid #E2E2E2;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 5%;
            gap: 20px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -1px;
            cursor: pointer;
            white-space: nowrap;
        }

        .logo span {
            color: var(--uber-green);
        }

        /* 住所設定バー */
        .location-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--uber-gray-bg);
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            max-width: 450px;
        }

        .location-bar i {
            font-size: 1.1rem;
        }

        .location-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ナビ右側ボタン */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-black {
            background: var(--uber-black);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-btn-uber {
            background: var(--uber-black);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .cart-count {
            background: var(--uber-green);
            color: white;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 0.8rem;
        }

        /* カテゴリ横スクロールバー */
        .categories-wrapper {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 10px 5% 15px 5%;
            scrollbar-width: none; /* Firefox */
        }

        .categories-wrapper::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .cat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            min-width: 64px;
            transition: transform 0.1s;
        }

        .cat-item:hover {
            transform: scale(1.05);
        }

        .cat-icon {
            width: 56px;
            height: 56px;
            background: var(--uber-gray-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .cat-item span {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--uber-black);
            white-space: nowrap;
        }

        /* --- メインコンテンツ --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Uber Eats風 レストラン＆商品カード */
        .restaurant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .store-card {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .store-img-container {
            position: relative;
            width: 100%;
            height: 160px;
            background: #eee;
            border-radius: var(--radius-md);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .favorite-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
        }

        .store-info {
            padding-top: 10px;
        }

        .store-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .store-name {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .rating-badge {
            background: var(--uber-gray-bg);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .store-meta {
            color: var(--uber-gray-text);
            font-size: 0.85rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-to-cart-quick {
            margin-top: 10px;
            width: 100%;
            background: var(--uber-gray-bg);
            border: none;
            padding: 8px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-to-cart-quick:hover {
            background: #E2E2E2;
        }

        /* --- モーダル (Uberスタイル) --- */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 2000;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 500px;
            border-radius: var(--radius-lg);
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-x {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--uber-gray-bg);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .btn-green {
            width: 100%;
            background: var(--uber-green);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .btn-green:hover {
            background: var(--uber-green-hover);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--uber-gray-bg);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--uber-black);
            background: white;
        }

        /* カートリスト */
        .cart-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .qty-picker {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--uber-gray-bg);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .qty-picker button {
            border: none;
            background: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Uber Eatsヘッダー -->
    <header>
        <div class="header-top">
            <div class="logo" onclick="location.reload()">Uber <span>Eats</span></div>
            
            <div class="location-bar">
                <i class="fa-solid fa-location-dot"></i>
                <div class="location-text" id="userAddressDisplay">お届け先: 東京都渋谷区宇田川町...</div>
                <i class="fa-solid fa-chevron-down" style="margin-left:auto; font-size:0.8rem;"></i>
            </div>

            <div class="nav-actions">
                <button class="btn-black" id="authBtn" onclick="openAuthModal()">
                    <i class="fa-solid fa-user"></i> <span id="authBtnText">ログイン</span>
                </button>
                <button class="cart-btn-uber" onclick="openCartModal()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count" id="cartBadge">0</span>
                </button>
            </div>
        </div>

        <!-- カテゴリ横スクロール -->
        <div class="categories-wrapper">
            <div class="cat-item" onclick="filterCategory('all')">
                <div class="cat-icon">🍽️</div>
                <span>すべて</span>
            </div>
            <div class="cat-item" onclick="filterCategory('バーガー')">
                <div class="cat-icon">🍔</div>
                <span>バーガー</span>
            </div>
            <div class="cat-item" onclick="filterCategory('ラーメン')">
                <div class="cat-icon">🍜</div>
                <span>ラーメン</span>
            </div>
            <div class="cat-item" onclick="filterCategory('スシ')">
                <div class="cat-icon">🍣</div>
                <span>寿司</span>
            </div>
            <div class="cat-item" onclick="filterCategory('ピザ')">
                <div class="cat-icon">🍕</div>
                <span>ピザ</span>
            </div>
            <div class="cat-item" onclick="filterCategory('スイーツ')">
                <div class="cat-icon">🍰</div>
                <span>スイーツ</span>
            </div>
            <div class="cat-item" onclick="filterCategory('カフェ')">
                <div class="cat-icon">☕️</div>
                <span>カフェ</span>
            </div>
        </div>
    </header>

    <div class="container">
        
        <h2 class="section-title">本日のおすすめ店舗</h2>

        <div class="restaurant-grid" id="productGrid">
            <!-- JSで動的生成 -->
        </div>

    </div>

    <!-- カート モーダル -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <button class="close-x" onclick="closeModal('cartModal')"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-title">カートの注文</div>

            <div id="cartItemsContainer">
                <!-- カート商品 -->
            </div>

            <div id="cartSummaryBox" class="hidden" style="margin-top:20px; border-top:2px solid #eee; padding-top:15px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>小計</span><span id="subtotalText">0円</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>配送手数料</span><span id="shippingText">0円</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem; margin-top:10px;">
                    <span>合計</span><span id="totalText">0円</span>
                </div>

                <!-- ステップ1: コード送信 -->
                <div id="checkoutStep1">
                    <button class="btn-green" onclick="startCheckout()">注文の確認へ進む</button>
                </div>

                <!-- ステップ2: 認証コード入力 -->
                <div id="checkoutStep2" class="hidden" style="margin-top:15px;">
                    <div class="form-group">
                        <label>メールに届いた 6桁の認証コード</label>
                        <input type="text" id="orderAuthCode" placeholder="123456" maxlength="6">
                    </div>
                    <button class="btn-green" onclick="submitOrder()">注文を確定する</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ログイン モーダル -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="close-x" onclick="closeModal('authModal')"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-title" id="authModalTitle">ログインまたは登録</div>

            <div id="loginView">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn-green" onclick="requestLoginCode()">次へ</button>
                <p style="text-align:center; margin-top:15px; font-size:0.85rem; cursor:pointer; font-weight:bold;" onclick="toggleAuthMode('register')">アカウントを作成する</p>
            </div>

            <div id="loginVerifyView" class="hidden">
                <div class="form-group">
                    <label>6桁のコードを入力</label>
                    <input type="text" id="loginCode" placeholder="123456" maxlength="6">
                </div>
                <button class="btn-green" onclick="verifyLoginCode()">ログイン</button>
            </div>

            <div id="registerView" class="hidden">
                <div class="form-group">
                    <label>お名前</label>
                    <input type="text" id="regName" placeholder="山田 太郎">
                </div>
                <div class="form-group">
                    <label>お届け先住所</label>
                    <input type="text" id="regAddress" placeholder="東京都渋谷区...">
                </div>
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="regEmail" placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="regPassword" placeholder="••••••••">
                </div>
                <button class="btn-green" onclick="requestRegisterCode()">認証コードを送信</button>
                <p style="text-align:center; margin-top:15px; font-size:0.85rem; cursor:pointer; font-weight:bold;" onclick="toggleAuthMode('login')">すでにアカウントをお持ちの方</p>
            </div>

            <div id="registerVerifyView" class="hidden">
                <div class="form-group">
                    <label>6桁の認証コード</label>
                    <input type="text" id="regCode" placeholder="123456" maxlength="6">
                </div>
                <button class="btn-green" onclick="completeRegister()">登録を完了</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzmJ11twqRSpmty1RRrneRvN7lZcJPOnQ3wdCVXCIAZLck-7dqpa0PX2kQlR-jjbChh/exec";

        let products = [];
        let cart = [];
        let currentUser = null;

        const emojis = ['🍔', '🍕', '🍜', '🍱', '🍣', '🍛', '🥪', '🥗', '🍰', '☕️'];

        window.onload = function() {
            const saved = localStorage.getItem("rabbit_user");
            if (saved) {
                currentUser = JSON.parse(saved);
                updateUserUI();
            }
            fetchProducts();
        };

        async function fetchProducts() {
            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "get_products" })
                });
                const data = await res.json();
                if (data.status === "success") {
                    products = data.products;
                    renderProducts(products);
                }
            } catch (e) {
                document.getElementById('productGrid').innerHTML = '<p>読み込み失敗</p>';
            }
        }

        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = list.map((p, idx) => `
                <div class="store-card">
                    <div class="store-img-container">
                        ${emojis[idx % emojis.length]}
                        <button class="favorite-btn"><i class="fa-regular fa-heart"></i></button>
                    </div>
                    <div class="store-info">
                        <div class="store-header">
                            <div class="store-name">${p.name}</div>
                            <div class="rating-badge"><i class="fa-solid fa-star" style="color:#000;"></i> 4.8</div>
                        </div>
                        <div class="store-meta">
                            <span>${p.shop}</span> • <span>15–25 分</span> • <span>配送手数料 ${p.shipping}円</span>
                        </div>
                        <div style="font-weight:bold; margin-top:4px;">${p.price.toLocaleString()}円</div>
                        <button class="add-to-cart-quick" onclick="addToCart(${p.id})">カートに追加</button>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            if (cat === 'all') {
                renderProducts(products);
            } else {
                const filtered = products.filter(p => p.name.includes(cat) || p.shop.includes(cat));
                renderProducts(filtered);
            }
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            if (!prod) return;
            const exist = cart.find(c => c.id === id);
            if (exist) exist.qty++;
            else cart.push({ ...prod, qty: 1 });
            
            document.getElementById('cartBadge').innerText = cart.reduce((s, c) => s + c.qty, 0);
        }

        function openCartModal() {
            renderCart();
            document.getElementById('cartModal').classList.add('active');
        }

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:30px; color:var(--uber-gray-text);">カートに商品が入っていません</p>';
                document.getElementById('cartSummaryBox').classList.add('hidden');
                return;
            }

            document.getElementById('cartSummaryBox').classList.remove('hidden');
            let subtotal = 0;
            let shipping = 0;

            container.innerHTML = cart.map(item => {
                subtotal += item.price * item.qty;
                shipping = Math.max(shipping, item.shipping);

                return `
                    <div class="cart-row">
                        <div>
                            <div style="font-weight:bold;">${item.name}</div>
                            <div style="font-size:0.85rem; color:var(--uber-gray-text);">${item.price.toLocaleString()}円</div>
                        </div>
                        <div class="qty-picker">
                            <button onclick="changeQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotalText').innerText = subtotal.toLocaleString() + '円';
            document.getElementById('shippingText').innerText = shipping.toLocaleString() + '円';
            document.getElementById('totalText').innerText = (subtotal + shipping).toLocaleString() + '円';
        }

        function changeQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            document.getElementById('cartBadge').innerText = cart.reduce((s, c) => s + c.qty, 0);
            renderCart();
        }

        async function startCheckout() {
            if (!currentUser) {
                closeModal('cartModal');
                openAuthModal();
                alert("注文にはログインが必要です。");
                return;
            }
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "send_order_code", email: currentUser.email })
            });
            const data = await res.json();
            if (data.status === "success") {
                document.getElementById('checkoutStep1').classList.add('hidden');
                document.getElementById('checkoutStep2').classList.remove('hidden');
            } else alert(data.message);
        }

        async function submitOrder() {
            const code = document.getElementById('orderAuthCode').value;
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "verify_and_create_order",
                    email: currentUser.email,
                    name: currentUser.name,
                    address: currentUser.address,
                    items: cart.map(c => `${c.name} x${c.qty}`).join(', '),
                    subtotal: cart.reduce((s, c) => s + c.price * c.qty, 0),
                    shipping: Math.max(...cart.map(c => c.shipping)),
                    code: code
                })
            });
            const data = await res.json();
            if (data.status === "success") {
                alert(`ご注文ありがとうございます！\n追跡番号: ${data.trackingNo}`);
                cart = [];
                document.getElementById('cartBadge').innerText = 0;
                closeModal('cartModal');
            } else alert(data.message);
        }

        // --- モーダル・ユーザー処理 ---
        function openAuthModal() {
            if (currentUser) {
                if (confirm(`${currentUser.name} 様。ログアウトしますか？`)) {
                    localStorage.removeItem("rabbit_user");
                    currentUser = null;
                    updateUserUI();
                }
                return;
            }
            document.getElementById('authModal').classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function updateUserUI() {
            document.getElementById('authBtnText').innerText = currentUser ? currentUser.name : "ログイン";
            if (currentUser) {
                document.getElementById('userAddressDisplay').innerText = `お届け先: ${currentUser.address}`;
            }
        }

        function toggleAuthMode(mode) {
            document.getElementById('loginView').classList.toggle('hidden', mode !== 'login');
            document.getElementById('registerView').classList.toggle('hidden', mode !== 'register');
        }

        async function requestLoginCode() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "send_login_code", email, password }) });
            const data = await res.json();
            if (data.status === "success") {
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('loginVerifyView').classList.remove('hidden');
            } else alert(data.message);
        }

        async function verifyLoginCode() {
            const email = document.getElementById('loginEmail').value;
            const code = document.getElementById('loginCode').value;
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "verify_login_code", email, code }) });
            const data = await res.json();
            if (data.status === "success") {
                currentUser = data.user;
                localStorage.setItem("rabbit_user", JSON.stringify(currentUser));
                updateUserUI();
                closeModal('authModal');
            } else alert(data.message);
        }

        async function requestRegisterCode() {
            const email = document.getElementById('regEmail').value;
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "send_code", email }) });
            const data = await res.json();
            if (data.status === "success") {
                document.getElementById('registerView').classList.add('hidden');
                document.getElementById('registerVerifyView').classList.remove('hidden');
            } else alert(data.message);
        }

        async function completeRegister() {
            const name = document.getElementById('regName').value;
            const address = document.getElementById('regAddress').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const code = document.getElementById('regCode').value;

            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "complete_profile", name, address, email, password, code })
            });
            const data = await res.json();
            if (data.status === "success") {
                currentUser = data.user;
                localStorage.setItem("rabbit_user", JSON.stringify(currentUser));
                updateUserUI();
                closeModal('authModal');
            } else alert(data.message);
        }
    </script>
</body>
</html>
