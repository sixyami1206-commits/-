<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デリバリー 🥡 Rabbit</title>
  <style>
    :root {
      --bg-main: #0e131f;
      --bg-card: #1a2235;
      --bg-input: #121826;
      --accent-green: #06c167; /* Uber風グリーン */
      --accent-hover: #049e53;
      --accent-orange: #ff6b00;
      --text-white: #ffffff;
      --text-gray: #a0aec0;
      --border-color: #2d3748;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-white); padding-bottom: 90px; }

    /* ヘッダー */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14, 19, 31, 0.95);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border-color);
    }
    .brand { font-size: 1.4rem; font-weight: 800; color: var(--text-white); display: flex; align-items: center; gap: 6px; }
    .brand span { color: var(--accent-green); }
    
    .header-btns { display: flex; gap: 10px; }
    .btn-header { background: var(--bg-card); color: var(--text-white); border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; cursor: pointer; }
    .btn-header.primary { background: var(--accent-green); border: none; color: #000; }

    .container { max-width: 600px; margin: 0 auto; padding: 15px; }

    /* 検索バー */
    .search-wrapper { position: relative; margin-bottom: 15px; }
    .search-input {
      width: 100%; padding: 12px 16px 12px 42px;
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 25px; color: var(--text-white); font-size: 0.95rem; outline: none;
    }
    .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-gray); }

    /* 店舗・商品カード */
    .shop-section { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 20px; overflow: hidden; }
    .shop-header { padding: 14px 18px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .shop-name { font-size: 1.1rem; font-weight: 700; color: var(--text-white); }
    .shop-shipping { font-size: 0.8rem; color: var(--accent-orange); background: rgba(255,107,0,0.1); padding: 4px 8px; border-radius: 12px; }

    .product-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .product-item:last-child { border-bottom: none; }
    .product-detail h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .product-detail p { font-size: 0.85rem; color: var(--text-gray); }

    .add-btn { background: var(--accent-green); color: #000; border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* 下部フロート決済バー */
    .float-cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-card); border-top: 1px solid var(--border-color);
      padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
      z-index: 90;
    }
    .cart-info-text { font-size: 0.85rem; color: var(--text-gray); }
    .cart-total-price { font-size: 1.2rem; font-weight: 800; color: var(--text-white); }
    .btn-checkout { background: var(--accent-green); color: #000; border: none; padding: 12px 24px; border-radius: 25px; font-weight: 700; font-size: 0.95rem; cursor: pointer; }

    /* モーダル / 表示エリア */
    .view-page { display: none; }
    .view-page.active { display: block; }
    
    .card-box { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 15px; }
    .input-group { margin-bottom: 14px; }
    .input-group label { font-size: 0.8rem; color: var(--text-gray); display: block; margin-bottom: 5px; }
    .input-group input, .input-group textarea {
      width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-color);
      border-radius: 8px; color: var(--text-white); font-size: 0.9rem;
    }
    .btn-action { width: 100%; background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn-secondary { width: 100%; background: transparent; color: var(--text-gray); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>

  <header>
    <div class="brand">デリバリー <span>Rabbit 🥡</span></div>
    <div class="header-btns">
      <button id="auth-btn" class="btn-header" onclick="showPage('page-auth')">ログイン</button>
      <button class="btn-header" onclick="showPage('page-support')">サポート</button>
    </div>
  </header>

  <div class="container">

    <!-- ① メインメニュー画面 -->
    <div id="page-menu" class="view-page active">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-input" placeholder="お店や料理名で検索..." oninput="filterProducts()">
      </div>

      <div id="product-container">商品データを読み込んでいます...</div>
    </div>

    <!-- ② 注文確認・チェックアウト画面 -->
    <div id="page-checkout" class="view-page">
      <div class="card-box">
        <h2 style="margin-bottom: 15px;">🛍️ ご注文内容の確認</h2>
        <div id="checkout-cart-items" style="margin-bottom: 15px; font-size: 0.9rem; color: var(--text-gray);"></div>
        <hr style="border-color: var(--border-color); margin-bottom: 15px;">

        <div class="input-group">
          <label>お名前</label>
          <input type="text" id="order-name" placeholder="山田 太郎">
        </div>
        <div class="input-group">
          <label>お届け先住所</label>
          <input type="text" id="order-address" placeholder="東京都...">
        </div>
        <div class="input-group">
          <label>メールアドレス</label>
          <input type="email" id="order-email" placeholder="example@gmail.com">
        </div>

        <button class="btn-action" onclick="submitOrder()">注文を確定する 🛵💨</button>
        <button class="btn-secondary" onclick="showPage('page-menu')">メニューに戻る</button>
      </div>
    </div>

    <!-- ③ ログイン・会員登録 -->
    <div id="page-auth" class="view-page">
      <div class="card-box">
        <h2>👤 会員ログイン</h2>
        <div class="input-group" style="margin-top: 15px;">
          <label>メールアドレス</label>
          <input type="email" id="auth-email">
        </div>
        <div class="input-group">
          <label>パスワード</label>
          <input type="password" id="auth-pass">
        </div>
        <button class="btn-action" onclick="login()">ログイン</button>

        <hr style="border-color: var(--border-color); margin: 20px 0;">

        <h4>新規会員登録（メール認証）</h4>
        <button class="btn-secondary" onclick="sendAuthCode()">認証コードを送信</button>

        <div id="register-step2" style="display: none; margin-top: 15px;">
          <div class="input-group">
            <label>認証コード</label>
            <input type="text" id="auth-code" placeholder="6桁">
          </div>
          <div class="input-group">
            <label>お名前</label>
            <input type="text" id="reg-name">
          </div>
          <div class="input-group">
            <label>お届け先住所</label>
            <input type="text" id="reg-address">
          </div>
          <button class="btn-action" onclick="completeRegister()">登録完了</button>
        </div>

        <button class="btn-secondary" onclick="showPage('page-menu')">戻る</button>
      </div>
    </div>

    <!-- ④ サポート画面 -->
    <div id="page-support" class="view-page">
      <div class="card-box">
        <h2>💬 カスタマーサポート</h2>
        <div class="input-group" style="margin-top:15px;">
          <label>お名前</label>
          <input type="text" id="supp-name">
        </div>
        <div class="input-group">
          <label>メールアドレス</label>
          <input type="email" id="supp-email">
        </div>
        <div class="input-group">
          <label>お問い合わせ内容</label>
          <textarea id="supp-msg" rows="4"></textarea>
        </div>
        <button class="btn-action" onclick="sendSupport()">送信する</button>
        <button class="btn-secondary" onclick="showPage('page-menu')">戻る</button>
      </div>
    </div>

  </div>

  <!-- 下部固定のフローティングカートバー -->
  <div class="float-cart-bar">
    <div>
      <div class="cart-info-text"><span id="cart-count">0</span> 点の注文</div>
      <div class="cart-total-price" id="cart-total">0円</div>
    </div>
    <button class="btn-checkout" onclick="goToCheckout()">注文手続きへ ➔</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyXHAia7M-SLAz9KIPIwCt20s4t95V8AW0BfcRrM5wFsgCVdj0ViUlN9yKlslFjJla9/exec";

    let products = [];
    let cart = [];

    window.onload = loadProducts;

    function showPage(pageId) {
      document.querySelectorAll('.view-page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    async function loadProducts() {
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'get_products' }) });
        const data = await res.json();

        if (data.status === 'success') {
          products = data.products;
          renderMenu(products);
        }
      } catch (e) {
        document.getElementById('product-container').innerText = "通信エラーが発生しました。";
      }
    }

    function renderMenu(items) {
      const container = document.getElementById('product-container');
      container.innerHTML = "";

      const shops = {};
      items.forEach(p => {
        if (!shops[p.shop]) shops[p.shop] = [];
        shops[p.shop].push(p);
      });

      for (const shopName in shops) {
        const shop = shops[shopName];
        const shipping = shop[0].shipping;

        let shopHtml = `
          <div class="shop-section">
            <div class="shop-header">
              <div class="shop-name">🏪 ${shopName}</div>
              <div class="shop-shipping">送料 ${shipping}円</div>
            </div>
        `;

        shop.forEach(p => {
          shopHtml += `
            <div class="product-item">
              <div class="product-detail">
                <h4>${p.name}</h4>
                <p>${p.price}円</p>
              </div>
              <button class="add-btn" onclick="addToCart(${p.id})">＋</button>
            </div>
          `;
        });

        shopHtml += `</div>`;
        container.innerHTML += shopHtml;
      }
    }

    function filterProducts() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.shop.toLowerCase().includes(q));
      renderMenu(filtered);
    }

    function addToCart(id) {
      const p = products.find(i => i.id === id);
      if (p) {
        cart.push(p);
        updateCartUI();
      }
    }

    function updateCartUI() {
      document.getElementById('cart-count').innerText = cart.length;
      const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
      const shipping = cart.length > 0 ? Math.max(...cart.map(i => i.shipping)) : 0;
      document.getElementById('cart-total').innerText = (subtotal + shipping) + "円";
    }

    function goToCheckout() {
      if (cart.length === 0) return alert('カートに商品を入れてください！');
      
      const itemsContainer = document.getElementById('checkout-cart-items');
      itemsContainer.innerHTML = cart.map(i => `<div>・${i.name} (${i.price}円)</div>`).join('');
      
      showPage('page-checkout');
    }

    async function submitOrder() {
      const name = document.getElementById('order-name').value;
      const address = document.getElementById('order-address').value;
      const email = document.getElementById('order-email').value;

      if (!name || !address || !email) return alert('すべての項目を入力してください');

      const itemsText = cart.map(i => i.name).join(', ');
      const subtotal = cart.reduce((sum, i) => sum + i.price, 0);
      const shipping = Math.max(...cart.map(i => i.shipping));

      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'create_order', name, address, email, items: itemsText, subtotal, shipping })
      });

      const data = await res.json();
      alert(`${data.message}\n注文ID: ${data.orderId}`);
      if (data.status === 'success') {
        cart = [];
        updateCartUI();
        showPage('page-menu');
      }
    }

    async function sendSupport() {
      const name = document.getElementById('supp-name').value;
      const email = document.getElementById('supp-email').value;
      const message = document.getElementById('supp-msg').value;

      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'send_support', name, email, message })
      });

      const data = await res.json();
      alert(data.message);
      if (data.status === 'success') showPage('page-menu');
    }

    // 会員登録関連
    async function sendAuthCode() {
      const email = document.getElementById('auth-email').value;
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'send_code', email }) });
      const data = await res.json();
      alert(data.message);
      if (data.status === 'success') document.getElementById('register-step2').style.display = 'block';
    }

    async function completeRegister() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-pass').value;
      const code = document.getElementById('auth-code').value;
      const name = document.getElementById('reg-name').value;
      const address = document.getElementById('reg-address').value;

      const vRes = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'verify_code', email, code }) });
      const vData = await vRes.json();
      if (vData.status !== 'success') return alert(vData.message);

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'complete_profile', email, password, name, address }) });
      const data = await res.json();
      alert(data.message);
      if (data.status === 'success') showPage('page-menu');
    }

    async function login() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-pass').value;

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'login', email, password }) });
      const data = await res.json();
      alert(data.message);
      if (data.status === 'success') showPage('page-menu');
    }
  </script>
</body>
</html>
