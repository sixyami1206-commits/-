<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員専用ポータル</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card: #151c2c;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --border: #1f293d;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--card);
      width: 100%;
      max-width: 440px;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.6);
      border: 1px solid var(--border);
    }

    .view { display: none; }
    .view.active { display: block; }

    h2 { font-size: 1.6rem; text-align: center; margin-bottom: 8px; color: #fff; }
    p.sub { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #0b0f19;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: 8px;
    }

    .btn-outline:hover { background: #1f293d; }

    .timer-badge {
      background: var(--danger);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- ① ホーム画面 -->
    <div id="view-home" class="view active">
      <h2>WELCOME</h2>
      <p class="sub">サービスをご利用いただくにはログインが必要です</p>
      <button class="btn" onclick="showView('view-login')">ログイン</button>
      <button class="btn btn-outline" onclick="showView('view-register')">新規会員登録</button>
    </div>

    <!-- ② 新規登録（メアド・パスワード） -->
    <div id="view-register" class="view">
      <h2>新規会員登録</h2>
      <p class="sub">メールアドレスとパスワードを設定してください</p>
      
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="reg-email" autocomplete="off" placeholder="example@gmail.com">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="reg-pass" autocomplete="new-password" placeholder="••••••••">
      </div>
      
      <button class="btn" onclick="sendCode()">認証コードを送信</button>
      <button class="btn btn-outline" onclick="showView('view-home')">戻る</button>
    </div>

    <!-- ③ 認証コード入力 -->
    <div id="view-verify" class="view">
      <h2>コード認証</h2>
      <p class="sub">メールに届いた6桁のコードを入力してください</p>
      
      <div class="field">
        <input type="text" id="ver-code" autocomplete="off" placeholder="123456" style="text-align: center; letter-spacing: 4px; font-size: 1.2rem;">
      </div>
      
      <button class="btn" onclick="verifyCode()">次へ進む</button>
    </div>

    <!-- ④ プロフィール登録（名前・住所） -->
    <div id="view-profile-setup" class="view">
      <h2>プロフィール登録</h2>
      <p class="sub">お名前とご住所を入力してください</p>
      
      <div class="field">
        <label>お名前</label>
        <input type="text" id="setup-name" autocomplete="off" placeholder="山田 太郎">
      </div>
      <div class="field">
        <label>ご住所</label>
        <input type="text" id="setup-address" autocomplete="off" placeholder="東京都渋谷区...">
      </div>
      
      <button class="btn" onclick="completeProfile()">登録を完了する</button>
    </div>

    <!-- ⑤ ログイン -->
    <div id="view-login" class="view">
      <h2>ログイン</h2>
      <p class="sub">登録したメールアドレスとパスワードを入力</p>
      
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="login-email" autocomplete="off" placeholder="example@gmail.com">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••">
      </div>
      
      <button class="btn" onclick="login()">ログイン</button>
      <button class="btn btn-outline" onclick="showView('view-home')">戻る</button>
    </div>

    <!-- ⑥ マイページ -->
    <div id="view-mypage" class="view">
      <h2>マイページ</h2>
      <p class="sub">ログイン中: <span id="current-user-email" style="color: #fff; font-weight: bold;"></span></p>

      <!-- ロック状態（認証コード要求） -->
      <div id="mypage-lock" style="text-align: center;">
        <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 15px;">アカウント情報を表示するには認証コードが必要です</p>
        <button class="btn" onclick="requestMypageCode()">確認用コードをメールに送る</button>
        
        <div class="field" style="margin-top: 20px;">
          <input type="text" id="mypage-code" autocomplete="off" placeholder="届いた6桁のコードを入力" style="text-align: center;">
        </div>
        <button class="btn" onclick="unlockProfile()">認証して表示する</button>
      </div>

      <!-- 情報表示エリア（20秒閲覧制限） -->
      <div id="mypage-content" style="display: none;">
        <div style="text-align: center;">
          <span class="timer-badge">閲覧制限: 残り <span id="timer-sec">20</span> 秒</span>
        </div>

        <div class="field">
          <label>お名前</label>
          <input type="text" id="my-name" autocomplete="off">
        </div>
        <div class="field">
          <label>ご住所</label>
          <input type="text" id="my-address" autocomplete="off">
        </div>

        <button class="btn" onclick="updateProfile()">変更を保存</button>
      </div>

      <button class="btn btn-outline" onclick="logout()" style="margin-top: 20px;">ログアウト</button>
    </div>

  </div>

  <script>
    // ▼ 最新のGAS URLに更新済み！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwy8zHBO9ZuG_-jyjBmc8qnjXZh-Pd93n8-_FoQfzb0EBHIFVhdzkZ_aTQroALRMsXU/exec";
    
    let currentEmail = "";
    let regPassword = "";
    let timerInterval = null;

    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
    }

    // 1. 仮登録（コード送信）
    async function sendCode() {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-pass').value;

      if (!email || !password) return alert('メールアドレスとパスワードを入力してください');

      currentEmail = email;
      regPassword = password;

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'send_code', email, password }) });
      const data = await res.json();
      alert(data.message);

      if (data.status === 'success') showView('view-verify');
    }

    // 2. コード検証
    async function verifyCode() {
      const code = document.getElementById('ver-code').value;
      if (!code) return alert('認証コードを入力してください');

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'verify_code', email: currentEmail, code }) });
      const data = await res.json();
      alert(data.message);

      if (data.status === 'success') showView('view-profile-setup');
    }

    // 3. 本登録完了
    async function completeProfile() {
      const name = document.getElementById('setup-name').value;
      const address = document.getElementById('setup-address').value;

      if (!name || !address) return alert('名前と住所を入力してください');

      const res = await fetch(GAS_URL, { 
        method: 'POST', 
        body: JSON.stringify({ action: 'complete_profile', email: currentEmail, password: regPassword, name, address }) 
      });
      const data = await res.json();
      alert(data.message);

      if (data.status === 'success') showView('view-login');
    }

    // 4. ログイン
    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-pass').value;

      if (!email || !password) return alert('メールアドレスとパスワードを入力してください');

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'login', email, password }) });
      const data = await res.json();
      alert(data.message);

      if (data.status === 'success') {
        currentEmail = email;
        document.getElementById('current-user-email').innerText = email;
        showView('view-mypage');
      }
    }

    // 5-A. マイページ用コードの要求
    async function requestMypageCode() {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'request_mypage_code', email: currentEmail }) });
      const data = await res.json();
      alert(data.message);
    }

    // 5-B. マイページ情報のロック解除（20秒タイマー）
    async function unlockProfile() {
      const code = document.getElementById('mypage-code').value;
      if (!code) return alert('認証コードを入力してください');

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'get_profile', email: currentEmail, code }) });
      const data = await res.json();

      if (data.status === 'success') {
        document.getElementById('mypage-lock').style.display = 'none';
        document.getElementById('mypage-content').style.display = 'block';
        document.getElementById('my-name').value = data.data.name;
        document.getElementById('my-address').value = data.data.address;

        let timeLeft = 20;
        document.getElementById('timer-sec').innerText = timeLeft;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          timeLeft--;
          document.getElementById('timer-sec').innerText = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert('20秒が経過したため情報を非表示にしました');
            document.getElementById('mypage-content').style.display = 'none';
            document.getElementById('mypage-lock').style.display = 'block';
            document.getElementById('mypage-code').value = '';
          }
        }, 1000);

      } else {
        alert(data.message);
      }
    }

    // 6. プロフィール更新
    async function updateProfile() {
      const name = document.getElementById('my-name').value;
      const address = document.getElementById('my-address').value;

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'update_profile', email: currentEmail, name, address }) });
      const data = await res.json();
      alert(data.message);
    }

    // ログアウト
    function logout() {
      clearInterval(timerInterval);
      currentEmail = "";
      document.getElementById('mypage-content').style.display = 'none';
      document.getElementById('mypage-lock').style.display = 'block';
      document.getElementById('mypage-code').value = '';
      showView('view-home');
    }
  </script>
</body>
</html>
