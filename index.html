<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員ポータル</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 420px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
    }

    /* タブ切り替えボタン */
    .tabs {
      display: flex;
      background: #0f172a;
      padding: 4px;
      border-radius: 10px;
      margin-bottom: 25px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    /* フォーム切替制御 */
    .form-group { display: none; }
    .form-group.active { display: block; }

    h2 { font-size: 1.5rem; margin-bottom: 8px; text-align: center; }
    p.sub { font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-bottom: 20px; }

    .input-field {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover { background: var(--primary-hover); }

    /* メール認証用モーダル（ポップアップ） */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
      border: 1px solid var(--border);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 上部タブ -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('register')">新規登録</button>
      <button class="tab-btn" onclick="switchTab('login')">ログイン</button>
    </div>

    <!-- 新規会員登録フォーム -->
    <div id="register-form" class="form-group active">
      <h2>アカウント作成</h2>
      <p class="sub">メールアドレスとパスワードを入力してください</p>
      
      <div class="input-field">
        <label>メールアドレス</label>
        <input type="email" id="reg-email" placeholder="example@gmail.com">
      </div>
      <div class="input-field">
        <label>パスワード</label>
        <input type="password" id="reg-pass" placeholder="••••••••">
      </div>
      <button class="btn" onclick="register()">登録してコード送信</button>
    </div>

    <!-- ログインフォーム -->
    <div id="login-form" class="form-group">
      <h2>おかえりなさい！</h2>
      <p class="sub">登録した情報でログインしてください</p>
      
      <div class="input-field">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="example@gmail.com">
      </div>
      <div class="input-field">
        <label>パスワード</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn" onclick="login()">ログイン</button>
    </div>
  </div>

  <!-- 認証コード入力ポップアップ -->
  <div id="verify-modal" class="modal-overlay">
    <div class="modal">
      <h2>メール認証</h2>
      <p class="sub" style="margin-top: 5px;">メールに届いた6桁のコードを入力してください</p>
      <div class="input-field" style="margin-top: 15px;">
        <input type="text" id="ver-code" placeholder="123456" style="text-align: center; font-size: 1.2rem; letter-spacing: 4px;">
      </div>
      <button class="btn" onclick="verify()">認証する</button>
    </div>
  </div>

  <script>
    // あなたのGASのURLをセット済みです！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxrKnzQ9pn4MkzMARqkqS4g2VE8iAyooI72l6SI53nBEXn0AVleXAfVFEjcJqLHjVYa/exec";

    // タブ切り替え処理
    function switchTab(type) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.form-group').forEach(form => form.classList.remove('active'));

      if (type === 'register') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('register-form').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('login-form').classList.add('active');
      }
    }

    // 1. 会員登録
    async function register() {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-pass').value;

      if(!email || !password) return alert('入力してください');

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'register', email, password }) });
      const data = await res.json();
      alert(data.message);

      if (data.status === 'success') {
        // 成功したらモーダル（ポップアップ）を表示
        document.getElementById('verify-modal').style.display = 'flex';
      }
    }

    // 2. コード認証
    async function verify() {
      const email = document.getElementById('reg-email').value;
      const code = document.getElementById('ver-code').value;

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'verify', email, code }) });
      const data = await res.json();
      alert(data.message);

      if (data.status === 'success') {
        document.getElementById('verify-modal').style.display = 'none';
        switchTab('login'); // 認証完了したらログインタブへ！
      }
    }

    // 3. ログイン
    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-pass').value;

      if(!email || !password) return alert('入力してください');

      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'login', email, password }) });
      const data = await res.json();
      alert(data.message);
    }
  </script>
</body>
</html>
